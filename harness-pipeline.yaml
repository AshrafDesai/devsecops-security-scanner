pipeline:
  name: DevSecOps Security Scanner Pipeline
  identifier: devsecops_scanner_pipeline
  projectIdentifier: DevSecOps_Scanner
  orgIdentifier: default
  description: Automated security scanning pipeline with deployment gate
  tags:
    security: devsecops
    scanner: python
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: devsecops-security-scanner
        build:
          type: branch
          spec:
            branch: main

  variables:
    - name: SCAN_TARGET
      type: String
      value: "https://www.surfatechintegratedsolutions.com"
      description: "URL of application to scan"
    - name: ENABLE_ZAP
      type: String
      value: "false"
      description: "Set to true to enable OWASP ZAP DAST scan"
    - name: THRESHOLD_CRITICAL
      type: Number
      value: 0
      description: "Max allowed CRITICAL findings before pipeline fails"
    - name: THRESHOLD_HIGH
      type: Number
      value: 2
      description: "Max allowed HIGH findings before pipeline fails"
    - name: THRESHOLD_MEDIUM
      type: Number
      value: 10
      description: "Max allowed MEDIUM findings (warning only)"
    - name: REPORT_DIR
      type: String
      value: "reports"
      description: "Directory to store scan reports"

  stages:
    - stage:
        name: Checkout and Validate
        identifier: checkout_validate
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Verify Repository Structure
                  identifier: verify_structure
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      echo "Repository structure:"
                      find . -maxdepth 3 -type f | sort
                      if [ ! -f "scanner/main.py" ]; then
                        echo "ERROR: scanner/main.py not found"
                        exit 1
                      fi
                      if [ ! -f "requirements.txt" ]; then
                        echo "ERROR: requirements.txt not found"
                        exit 1
                      fi
                      echo "Repository validation passed."

    - stage:
        name: Build and Setup
        identifier: build_setup
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Setup Python Environment
                  identifier: setup_python
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      python3 --version
                      pip3 --version
                      echo "Installing dependencies..."
                      pip3 install -r requirements.txt --quiet
                      echo "Dependencies installed successfully."

              - step:
                  name: Run Unit Tests
                  identifier: unit_tests
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      pip3 install pytest pytest-cov --quiet
                      python3 -m pytest tests/ -v --tb=short
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore

    - stage:
        name: Security Scan
        identifier: security_scan
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Install Dependencies
                  identifier: install_deps
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      apt-get update -qq && apt-get install -y nmap --quiet 2>/dev/null || true
                      pip3 install -r requirements.txt --quiet

              - step:
                  name: Execute Security Scanner
                  identifier: execute_scanner
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      SCAN_TARGET: <+pipeline.variables.SCAN_TARGET>
                      ENABLE_ZAP: <+pipeline.variables.ENABLE_ZAP>
                      REPORT_DIR: <+pipeline.variables.REPORT_DIR>
                      THRESHOLD_CRITICAL: <+pipeline.variables.THRESHOLD_CRITICAL>
                      THRESHOLD_HIGH: <+pipeline.variables.THRESHOLD_HIGH>
                      THRESHOLD_MEDIUM: <+pipeline.variables.THRESHOLD_MEDIUM>
                    command: |
                      ZAP_FLAG=""
                      if [ "$ENABLE_ZAP" = "true" ]; then ZAP_FLAG="--zap"; fi

                      python3 scanner/main.py \
                        --target "$SCAN_TARGET" \
                        --out-dir "$REPORT_DIR" \
                        --threshold-critical "$THRESHOLD_CRITICAL" \
                        --threshold-high "$THRESHOLD_HIGH" \
                        --threshold-medium "$THRESHOLD_MEDIUM" \
                        --verbose \
                        $ZAP_FLAG || true

                      echo "Scanner completed."

              - step:
                  name: Archive Reports
                  identifier: archive_reports
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      REPORT_DIR="${REPORT_DIR:-reports}"
                      if [ -d "$REPORT_DIR" ]; then
                        echo "Generated reports:"
                        ls -lh "$REPORT_DIR"
                        echo "--- JSON Summary ---"
                        cat "$REPORT_DIR/scan_report_latest.json" | python3 -m json.tool | head -40
                      else
                        echo "WARNING: Reports directory not found."
                      fi

    - stage:
        name: Security Gate
        identifier: security_gate
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Install Dependencies
                  identifier: install_deps_gate
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      pip3 install -r requirements.txt --quiet

              - step:
                  name: Run Scanner for Gate
                  identifier: run_scanner_gate
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      SCAN_TARGET: <+pipeline.variables.SCAN_TARGET>
                      REPORT_DIR: <+pipeline.variables.REPORT_DIR>
                      THRESHOLD_CRITICAL: <+pipeline.variables.THRESHOLD_CRITICAL>
                      THRESHOLD_HIGH: <+pipeline.variables.THRESHOLD_HIGH>
                      THRESHOLD_MEDIUM: <+pipeline.variables.THRESHOLD_MEDIUM>
                    command: |
                      apt-get update -qq && apt-get install -y nmap --quiet 2>/dev/null || true
                      pip3 install -r requirements.txt --quiet

                      python3 scanner/main.py \
                        --target "$SCAN_TARGET" \
                        --out-dir "$REPORT_DIR" \
                        --threshold-critical "$THRESHOLD_CRITICAL" \
                        --threshold-high "$THRESHOLD_HIGH" \
                        --threshold-medium "$THRESHOLD_MEDIUM" \
                        --verbose || true

              - step:
                  name: Evaluate Security Gate
                  identifier: evaluate_gate
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      REPORT_DIR: <+pipeline.variables.REPORT_DIR>
                      THRESHOLD_CRITICAL: <+pipeline.variables.THRESHOLD_CRITICAL>
                      THRESHOLD_HIGH: <+pipeline.variables.THRESHOLD_HIGH>
                    command: |
                      REPORT_FILE="${REPORT_DIR:-reports}/scan_report_latest.json"

                      if [ ! -f "$REPORT_FILE" ]; then
                        echo "ERROR: Report file missing: $REPORT_FILE"
                        exit 1
                      fi

                      CRITICAL=$(python3 -c "import json; d=json.load(open('$REPORT_FILE')); print(d['summary']['severity_counts']['CRITICAL'])")
                      HIGH=$(python3 -c "import json; d=json.load(open('$REPORT_FILE')); print(d['summary']['severity_counts']['HIGH'])")
                      RISK_SCORE=$(python3 -c "import json; d=json.load(open('$REPORT_FILE')); print(d['summary']['risk_score'])")
                      RISK_RATING=$(python3 -c "import json; d=json.load(open('$REPORT_FILE')); print(d['summary']['risk_rating'])")
                      PASSED=$(python3 -c "import json; d=json.load(open('$REPORT_FILE')); print(d['evaluation']['passed'])")

                      T_CRITICAL="${THRESHOLD_CRITICAL:-0}"
                      T_HIGH="${THRESHOLD_HIGH:-2}"

                      echo "============================================"
                      echo "  SECURITY GATE EVALUATION"
                      echo "============================================"
                      echo "  Risk Score  : $RISK_SCORE/100 ($RISK_RATING)"
                      echo "  Critical    : $CRITICAL (max: $T_CRITICAL)"
                      echo "  High        : $HIGH (max: $T_HIGH)"
                      echo "============================================"

                      GATE_PASSED=true

                      if [ "$CRITICAL" -gt "$T_CRITICAL" ]; then
                        echo "  FAIL: $CRITICAL CRITICAL findings exceed threshold of $T_CRITICAL"
                        GATE_PASSED=false
                      fi

                      if [ "$HIGH" -gt "$T_HIGH" ]; then
                        echo "  FAIL: $HIGH HIGH findings exceed threshold of $T_HIGH"
                        GATE_PASSED=false
                      fi

                      if [ "$GATE_PASSED" = "false" ]; then
                        echo ""
                        echo "SECURITY GATE FAILED - Blocking deployment!"
                        exit 1
                      fi

                      echo ""
                      echo "SECURITY GATE PASSED - Deployment approved."
                      exit 0

  flowControl:
    barriers: []